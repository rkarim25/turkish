<style>
  :root {
    --red: #e30a17; --red-soft: #fdeaea; --ink: #26211c; --muted: #7a726a;
    --bg: #faf7f2; --card: #ffffff; --border: #e7dfd5; --green: #0d7a5f; --green-soft: #e3f2ec;
    --amber: #b3730d; --radius: 14px; --shadow: 0 1px 3px rgba(40,30,20,.08);
  }
  * { box-sizing: border-box; margin: 0; }
  body { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
         background: var(--bg); color: var(--ink); line-height: 1.55; font-size: 16px; }
  main { max-width: 760px; margin: 0 auto; padding: 18px 16px 60px; }
  h1 { font-size: 26px; margin: 10px 0 6px; }
  h2 { font-size: 18px; margin: 0 0 10px; }
  .sub { color: var(--muted); font-size: 14.5px; margin-bottom: 16px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
          box-shadow: var(--shadow); padding: 16px; margin-bottom: 14px; }
  button { font: inherit; cursor: pointer; border: 1px solid var(--border); background: #fff;
           border-radius: 10px; padding: 8px 14px; color: var(--ink); }
  button.primary { background: var(--red); border-color: var(--red); color: #fff; font-weight: 600; }
  button.small { font-size: 13px; padding: 4px 10px; }
  button:disabled { opacity: .5; cursor: default; }
  a { color: var(--red); }
  .top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .crumb { font-size: 14px; text-decoration: none; }
  table { width: 100%; border-collapse: collapse; }
  td, th { padding: 9px 8px; border-bottom: 1px solid var(--border); vertical-align: top; text-align: left; }
  th { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  .tr-cell { font-weight: 700; font-size: 18px; white-space: normal; }
  .say { color: var(--amber); font-size: 13.5px; font-style: italic; }
  .en-cell { font-size: 15px; }
  .note { color: var(--muted); font-size: 13px; display: block; margin-top: 2px; }
  .parts { color: #3d6b84; font-size: 13px; display: block; margin-top: 2px; }
  .mn { color: #7b4fa6; font-size: 13px; display: block; margin-top: 2px; }
  .who { display: inline-block; font-size: 12px; font-weight: 700; color: var(--muted); min-width: 92px; }
  .cline { padding: 10px 8px; border-bottom: 1px dashed var(--border); }
  .cline.you { background: #fdf6f6; border-left: 3px solid var(--red); border-radius: 6px; }
  .veiled > span { visibility: hidden; }
  .veiled { background: #f3ede4; border-radius: 8px; cursor: pointer; }
  .rowbtn { border-color: var(--red); color: var(--red); }
  .rowbtn.on { background: var(--red-soft); font-weight: 700; }
  .mod { display: flex; gap: 12px; align-items: center; padding: 12px 14px; border: 1px solid var(--border);
         border-radius: var(--radius); background: var(--card); margin-bottom: 8px; text-decoration: none;
         color: var(--ink); box-shadow: var(--shadow); }
  .mod:hover { border-color: var(--red); }
  .mod .ico { font-size: 24px; width: 34px; text-align: center; }
  .mod .t { font-weight: 600; }
  .mod .m { color: var(--muted); font-size: 13px; }
  .mod .done { margin-left: auto; color: var(--green); font-weight: 700; white-space: nowrap; }
  .mod .togo { margin-left: auto; color: var(--muted); font-size: 13px; white-space: nowrap; }
  .bar { height: 8px; background: #eee4d6; border-radius: 999px; overflow: hidden; margin: 8px 0 4px; }
  .bar > div { height: 100%; background: var(--red); border-radius: 999px; transition: width .3s; }
  .pill { display: inline-block; background: var(--green-soft); color: var(--green); border-radius: 999px;
          padding: 2px 10px; font-size: 12.5px; font-weight: 600; }
  .exrow { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; align-items: center; }
  .mcq { display: flex; flex-direction: column; gap: 8px; margin: 10px 0; }
  .mcq button { text-align: left; padding: 10px 14px; }
  .mcq button.ok { border-color: var(--green); background: var(--green-soft); }
  .mcq button.no { border-color: var(--red); background: var(--red-soft); }
  .big { font-size: 22px; font-weight: 700; }
  input.filter { width: 100%; font: inherit; padding: 9px 12px; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; }
  .tag { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  @media (max-width: 520px) { td, th { padding: 8px 5px; } .tr-cell { font-size: 16.5px; } }
</style>

/* ---------- storage ---------- */
const store = {
  get(k, d) { try { const v = JSON.parse(localStorage.getItem(k)); return v === null || v === undefined ? d : v; } catch (e) { return d; } },
  set(k, v) { localStorage.setItem(k, JSON.stringify(v)); },
};
const doneMods = () => store.get("tk-done", {});
const cards = () => store.get("tk-cards", {});
function markCard(key, missed) {
  const c = store.get("tk-cards", {});
  const e = c[key] || { miss: 0, seen: 0, reps: 0 };
  if (missed) e.miss++; else e.miss = Math.max(0, e.miss - 1);
  e.seen = Date.now(); e.reps++;
  c[key] = e;
  store.set("tk-cards", c);
}
function allItems(onlyDone) {
  const out = [];
  MODULES.forEach(m => {
    if (onlyDone && !doneMods()[m.id]) return;
    m.items.forEach((it, i) => out.push({ key: m.id + ":" + i, mod: m, it }));
  });
  // your lines from the conversation join the refresh/final pool once played
  if (!onlyDone || doneMods().conv) {
    CONVO.forEach((l, i) => { if (l.who === "you") out.push({ key: "conv:" + i, mod: { id: "conv", ico: "🎭", title: "The conversation" }, it: l }); });
  }
  return out;
}

/* ---------- audio: recorded native speech, shipped with the site ----------
   Every item has a pre-generated mp3 (Microsoft neural Turkish voice) in
   audio/, precached by the service worker — audio works OFFLINE on any
   device. Browser TTS is only the emergency fallback. */
let _trVoice = null;
function loadVoices() {
  const vs = window.speechSynthesis ? speechSynthesis.getVoices() : [];
  _trVoice = vs.find(v => v.lang && v.lang.toLowerCase().startsWith("tr")) || null;
}
if (window.speechSynthesis) { speechSynthesis.onvoiceschanged = loadVoices; loadVoices(); }
function speak(t) {
  if (!_trVoice) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(t.replace(/\[|\]/g, ""));
  u.voice = _trVoice; u.lang = _trVoice.lang; u.rate = 0.85;
  speechSynthesis.speak(u);
}
let _cur = null;
function stopAudio() { if (_cur) { _cur.onended = null; _cur.pause(); _cur = null; } }
function playKey(key, tr, onend) {
  stopAudio();
  const a = new Audio("audio/" + key.replace(":", "-") + ".mp3");
  _cur = a;
  if (onend) a.onended = onend;
  a.play().catch(() => { speak(tr); if (onend) setTimeout(onend, 1500); });
}
const spkBtn = key => `<button class="small spk" data-key="${key}">🔊</button>`;
function wireSpk(root, lookup) {
  root.querySelectorAll(".spk").forEach(b => b.onclick = e => {
    e.stopPropagation();
    playKey(b.dataset.key, lookup ? lookup(b.dataset.key) : "");
  });
}

/* ---------- routing ---------- */
const app = document.getElementById("app");
window.addEventListener("hashchange", render);
function render() {
  const h = location.hash.slice(1) || "home";
  window.scrollTo({ top: 0 });
  if (h === "home") return home();
  if (h === "review") return review();
  if (h === "final") return finalCheck();
  if (h === "all") return cheatSheet();
  if (h === "conv") return convView(false);
  if (h === "conv-play") return convView(true);
  const [kind, id] = h.split("/");
  const m = MODULES.find(x => x.id === id);
  if (kind === "m" && m) return study(m);
  if (kind === "t" && m) return test(m);
  home();
}

/* ---------- 10-minute refresh: misses first, then least recently seen ---------- */
function review() {
  const pool = allItems(true);
  if (!pool.length) { location.hash = "home"; return; }
  const c = cards();
  const scored = pool.map(x => {
    const e = c[x.key] || { miss: 0, seen: 0 };
    return { ...x, miss: e.miss, seen: e.seen };
  }).sort((a, b) => b.miss - a.miss || a.seen - b.seen);
  const queue = scored.slice(0, 40).sort(() => 0.5 - Math.random());
  app.innerHTML = `
    <div class="top"><a class="crumb" href="#home">← Home</a><span class="tag">${queue.length} items ≈ 10 min</span></div>
    <h1>🔁 10-minute refresh</h1>
    <p class="sub">Misses first, then whatever you've seen least recently. Say the Turkish out loud, tap to check, mark only real misses.</p>
    <div class="card">
      <table><tbody id="tb">
      ${queue.map((x, qi) => `<tr data-k="${x.key}" data-q="${qi}">
        <td class="en-cell" style="width:45%">${x.it.en}${x.miss ? ` <span class="tag" style="color:var(--red)">missed ×${x.miss}</span>` : ""}</td>
        <td class="veiled"><span><span class="tr-cell" style="font-size:16.5px">${x.it.tr}</span> <span class="say">${x.it.say || ""}</span>${x.it.mn ? `<span class="mn">💡 ${x.it.mn}</span>` : ""}</span></td>
        <td style="width:60px"><button class="small rowbtn">✗</button></td>
      </tr>`).join("")}

      <div class="exrow">
        <button class="small" id="revealAll">👁 Reveal all</button>
        <button class="primary" id="finish">✓ Done — only the marked ones were misses</button>
      </div>
    </div>
  `;
  const tb = document.getElementById("tb");
  const missed = new Set();
  const byKey = Object.fromEntries(queue.map(x => [x.key, x]));
  tb.querySelectorAll("tr").forEach(tr => {
    const veil = tr.querySelector(".veiled");
    tr.onclick = () => { veil.classList.remove("veiled"); playKey(tr.dataset.k, byKey[tr.dataset.k].it.tr); };
    tr.querySelector(".rowbtn").onclick = (e) => {
      e.stopPropagation(); veil.classList.remove("veiled");

      else { missed.add(k); b.classList.add("on"); b.textContent = "✗ missed"; }
    };
  });

  document.getElementById("finish").onclick = () => {
    queue.forEach(x => markCard(x.key, missed.has(x.key)));
    const meta = store.get("tk-meta", {}); meta.lastRefresh = new Date().toDateString(); store.set("tk-meta", meta);
    const missPairs = queue.filter(x => missed.has(x.key)).map(x => ({ key: x.key, it: x.it }));
    app.innerHTML = `
      <div class="card" style="text-align:center;padding:30px 16px">
        <div class="big">🔁 Refresh done — ${queue.length - missed.size}/${queue.length}</div>

/* ---------- final check: 12 MCQs, 80% = trip-ready ---------- */
function finalCheck() {
  const pool = allItems(false).filter(x => x.mod.id !== "sounds");
  const qs = pool.sort(() => 0.5 - Math.random()).slice(0, 12);
  let pos = 0, right = 0;
  function ask() {
    if (pos >= qs.length) return finish();
    const q = qs[pos];
    const dir = Math.random() < 0.5;
    const wrong = pool.filter(x => x.key !== q.key).sort(() => 0.5 - Math.random()).slice(0, 3);
    const opts = [q, ...wrong].sort(() => 0.5 - Math.random());
    app.innerHTML = `
      <div class="top"><a class="crumb" href="#home">← Home</a><span class="tag">${pos + 1} / ${qs.length}</span></div>
      <h1>🎓 Final check</h1>
      <div class="card">
        <p style="font-size:18px;font-weight:600">${dir ? q.it.tr : q.it.en}</p>
        <p class="sub" style="margin:2px 0 8px">${dir ? "what does it mean?" : "how do you say it?"}</p>
        <div class="mcq" id="opts">
          ${opts.map((o, i) => `<button data-i="${i}">${dir ? o.it.en : o.it.tr}</button>`).join("")}
        </div>
        <div id="fb" style="min-height:30px;font-size:14px"></div>
      </div>`;
    document.querySelectorAll("#opts button").forEach(b => b.onclick = () => {
      const pick = opts[+b.dataset.i];
      const ok = pick.key === q.key;
      if (ok) right++;
      markCard(q.key, !ok);
      document.querySelectorAll("#opts button").forEach(x => {
        x.disabled = true;
        if (opts[+x.dataset.i].key === q.key) x.classList.add("ok");
      });
      if (!ok) b.classList.add("no");
      playKey(q.key, q.it.tr);
      document.getElementById("fb").innerHTML = `${ok ? "✓" : "✗"} <strong>${q.it.tr}</strong> = ${q.it.en} <span class="say">${q.it.say || ""}</span>`;
      pos++;
      setTimeout(ask, ok ? 1300 : 2600);
    });
  }
  function finish() {
    const pass = right >= 10;
    if (pass) { const meta = store.get("tk-meta", {}); meta.pass = { score: right, date: new Date().toLocaleDateString() }; store.set("tk-meta", meta); }
    app.innerHTML = `
      <div class="card" style="text-align:center;padding:30px 16px">
        <div class="big">${right} / ${qs.length} ${pass ? "— 🏅 trip-ready!" : ""}</div>
        <p class="sub" style="margin:8px 0 16px">${pass ? "İyi yolculuklar — have a great trip! Do one refresh on the plane." : "10+ passes. One refresh round and try again — your misses now lead the queue."}</p>
        <div class="exrow" style="justify-content:center">
          ${pass ? "" : `<a href="#review"><button class="primary">🔁 Refresh first</button></a>`}
          <a href="#final"><button ${pass ? 'class="primary"' : ""} onclick="setTimeout(render)">Try ${pass ? "again" : "the check again"}</button></a>
          <a href="#home"><button>Home</button></a>
        </div>
      </div>`;
  }
  ask();
}

/* ---------- drill the misses: repeat until the pile is empty ----------
   Same reveal-and-mark table (never flashcards) over ONLY the missed items,
   round after round, until nothing is marked. Every round feeds the SRS:
   a clean pass lowers an item's miss weight, a miss raises it — so what you
   clear here still comes back in a later refresh at a spaced interval. */
function drillLoop(pairs, round) {
  round = round || 1;
  const order = pairs.map((x, i) => i).sort(() => 0.5 - Math.random());
  app.innerHTML = `
    <div class="top"><a class="crumb" href="#home">← Home</a><span class="tag">miss drill · round ${round} · ${pairs.length} left</span></div>
    <h1>🎯 Only your misses</h1>
    <p class="sub">Say it out loud, tap to check (it plays), mark only what you still miss. Repeats until the pile is empty — mnemonics show on reveal to re-anchor.</p>
    <div class="card">
      <table><tbody id="tb">
      ${order.map(i => { const it = pairs[i].it; return `<tr data-i="${i}">
        <td class="en-cell" style="width:45%">${it.en}</td>
        <td class="veiled"><span><span class="tr-cell" style="font-size:16.5px">${it.tr}</span> <span class="say">${it.say || ""}</span>${it.mn ? `<span class="mn">💡 ${it.mn}</span>` : ""}${it.parts ? `<span class="parts">🧩 ${it.parts}</span>` : ""}</span></td>
        <td style="width:60px"><button class="small rowbtn">✗</button></td>
      </tr>`; }).join("")}
      </tbody></table>
      <div class="exrow">
        <button class="small" id="revealAll">👁 Reveal all</button>
        <button class="primary" id="finish">✓ Round done</button>
      </div>
    </div>
  `;
  const tb = document.getElementById("tb");
  const missed = new Set();
  tb.querySelectorAll("tr").forEach(tr => {
    const veil = tr.querySelector(".veiled");
    const i = +tr.dataset.i;
    tr.onclick = () => { veil.classList.remove("veiled"); playKey(pairs[i].key, pairs[i].it.tr); };
    tr.querySelector(".rowbtn").onclick = (e) => {
      e.stopPropagation(); veil.classList.remove("veiled");
      const b = e.target;
      if (missed.has(i)) { missed.delete(i); b.classList.remove("on"); b.textContent = "✗"; }
      else { missed.add(i); b.classList.add("on"); b.textContent = "✗ missed"; }
    };
  });
  document.getElementById("revealAll").onclick = () => tb.querySelectorAll(".veiled").forEach(v => v.classList.remove("veiled"));
  document.getElementById("finish").onclick = () => {
    pairs.forEach((p, i) => markCard(p.key, missed.has(i)));
    const still = pairs.filter((p, i) => missed.has(i));
    if (still.length) return drillLoop(still, round + 1);
    app.innerHTML = `
      <div class="card" style="text-align:center;padding:30px 16px">
        <div class="big">🎯 Miss pile empty — cleared in ${round} round${round > 1 ? "s" : ""}</div>
        <p class="sub" style="margin:8px 0 16px">They'll resurface in a later refresh at a spaced interval, to prove they actually stuck.</p>
        <div class="exrow" style="justify-content:center"><a href="#home"><button class="primary">Home</button></a></div>
      </div>`;
  };
}

/* ---------- offline: auto-download EVERYTHING on every visit ----------
   The SW precaches on install, but this belt-and-braces pass runs on every
   open/refresh: it checks each file (pages + all audio) is in the cache and
   fetches whatever is missing (the SW's fetch handler stores it). The home
   screen shows an honest count, so "offline-ready" is verified, not hoped. */
const OFF = { checked: 0, total: 0, failed: 0, done: false };
function offlineFileList() {
  const files = ["index.html", "manifest.webmanifest", "icons/icon-192.png", "icons/icon-512.png"];

  CONVO.forEach((_, i) => files.push(`audio/conv-${i}.mp3`));
  return files;
}
function updateOffStatus() {
  const el = document.getElementById("offStatus");
  if (!el || !OFF.total) return;
  el.innerHTML = OFF.done
    ? (OFF.failed === 0
      ? `<span style="color:var(--green);font-weight:600">✅ Fully downloaded — all ${OFF.total} files (course + every audio clip) are stored on this device. Plane mode works.</span>`
      : `<span style="color:var(--amber);font-weight:600">⚠️ ${OFF.total - OFF.failed}/${OFF.total} files stored — ${OFF.failed} still need a connection. Refresh once while online to finish.</span>`)
    : `⬇️ Downloading for offline use… ${OFF.checked}/${OFF.total}`;
}
async function ensureOffline() {
  if (!("caches" in window)) return;
  try { await (navigator.serviceWorker && navigator.serviceWorker.ready); } catch (e) {}
  const files = offlineFileList();
  OFF.total = files.length; OFF.checked = 0; OFF.failed = 0; OFF.done = false;
  for (const f of files) {
    try {
      const hit = await caches.match(new URL(f, location.href).href, { ignoreSearch: true });
      if (!hit) {
        const r = await fetch(f); // the service worker caches every OK response
        if (!r.ok) OFF.failed++;
      }
    } catch (e) { OFF.failed++; }
    OFF.checked++;
    if (OFF.checked % 10 === 0) updateOffStatus();
  }
  OFF.done = true;
  updateOffStatus();
}

if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(() => {});
ensureOffline();

render();
</script>
</body>
