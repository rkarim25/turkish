/* ---------- storage ---------- */
const store = {
  get(k, d) { try { const v = JSON.parse(localStorage.getItem(k)); return v === null || v === undefined ? d : v; } catch (e) { return d; } },
  set(k, v) { localStorage.setItem(k, JSON.stringify(v)); },
};
const doneMods = () => store.get("tk-done", {});
const cards = () => store.get("tk-cards", {});
function markCard(key, missed) {
  const c = store.get("tk-cards", {});
  const e = c[key] || { miss: 0, seen: 0, reps: 0 };
  if (missed) e.miss++; else e.miss = Math.max(0, e.miss - 1);
  e.seen = Date.now(); e.reps++;
  c[key] = e;
  store.set("tk-cards", c);
}
function allItems(onlyDone) {
  const out = [];
  MODULES.forEach(m => {
    if (onlyDone && !doneMods()[m.id]) return;
    m.items.forEach((it, i) => out.push({ key: m.id + ":" + i, mod: m, it }));
  });
  return out;
}

/* ---------- audio: recorded native speech, shipped with the site ----------
   Every item has a pre-generated mp3 (Microsoft neural Turkish voice) in
   audio/, precached by the service worker — audio works OFFLINE on any
   device. Browser TTS is only the emergency fallback. */
let _trVoice = null;
function loadVoices() {
  const vs = window.speechSynthesis ? speechSynthesis.getVoices() : [];
  _trVoice = vs.find(v => v.lang && v.lang.toLowerCase().startsWith("tr")) || null;
}
if (window.speechSynthesis) { speechSynthesis.onvoiceschanged = loadVoices; loadVoices(); }
function speak(t) {
  if (!_trVoice) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(t.replace(/\[|\]/g, ""));
  u.voice = _trVoice; u.lang = _trVoice.lang; u.rate = 0.85;
  speechSynthesis.speak(u);
}
let _cur = null;
function stopAudio() { if (_cur) { _cur.onended = null; _cur.pause(); _cur = null; } }
function playKey(key, tr, onend) {
  stopAudio();
  const a = new Audio("audio/" + key.replace(":", "-") + ".mp3");
  _cur = a;
  if (onend) a.onended = onend;
  a.play().catch(() => { speak(tr); if (onend) setTimeout(onend, 1500); });
}
const spkBtn = key => `<button class="small spk" data-key="${key}">🔊</button>`;
function wireSpk(root, lookup) {
  root.querySelectorAll(".spk").forEach(b => b.onclick = e => {
    e.stopPropagation();
    playKey(b.dataset.key, lookup ? lookup(b.dataset.key) : "");
  });
}

/* ---------- routing ---------- */
const app = document.getElementById("app");
window.addEventListener("hashchange", render);
function render() {
  const h = location.hash.slice(1) || "home";
  window.scrollTo({ top: 0 });
  if (h === "home") return home();
  if (h === "review") return review();
  if (h === "final") return finalCheck();
  if (h === "all") return cheatSheet();
  const [kind, id] = h.split("/");
  const m = MODULES.find(x => x.id === id);
  if (kind === "m" && m) return study(m);
  if (kind === "t" && m) return test(m);
  home();
}

/* ---------- home ---------- */
function home() {
  const dm = doneMods();
  const nDone = MODULES.filter(m => dm[m.id]).length;
  const minLeft = MODULES.filter(m => !dm[m.id]).reduce((a, m) => a + m.min, 0);
  const meta = store.get("tk-meta", {});
  const next = MODULES.find(m => !dm[m.id]);
  const c = cards();
  const missCount = Object.values(c).filter(x => x.miss > 0).length;
  app.innerHTML = `
    <h1>Türkçe <span style="color:var(--red)">in 2 hours</span></h1>
    <p class="sub">A work-trip course: 9 modules ≈ 2 hours, then a 10-minute refresh whenever you like.
    Everything works offline once loaded — plane mode is fine. No sign-in; progress lives on this device.</p>
    <div class="card">
      <div class="top"><h2>${nDone === MODULES.length ? "🎉 Course complete" : "Your course"}</h2>
        <span class="tag">${nDone}/${MODULES.length} modules · ${minLeft ? "≈" + minLeft + " min left" : "0 min left"}</span></div>
      <div class="bar"><div style="width:${Math.round(nDone / MODULES.length * 100)}%"></div></div>
      ${next ? `<div class="exrow"><a href="#m/${next.id}"><button class="primary">▶ ${nDone ? "Continue" : "Start"}: ${next.title} (${next.min} min)</button></a></div>` : `
      <div class="exrow">
        <a href="#review"><button class="primary">🔁 10-minute refresh${missCount ? ` (${missCount} weak)` : ""}</button></a>
        <a href="#final"><button>${meta.pass ? "🏅 Trip-ready — retake final check" : "🎓 Final check (12 questions)"}</button></a>
      </div>
      ${meta.pass ? `<p style="font-size:13px;color:var(--green);font-weight:600;margin-top:8px">🏅 Certified trip-ready — ${meta.pass.score}/12 on ${meta.pass.date}. Do the refresh before you land.</p>` : ""}`}
    </div>
    ${MODULES.map((m, i) => `
      <a class="mod" href="#m/${m.id}">
        <span class="ico">${m.ico}</span>
        <span><span class="t">${i + 1}. ${m.title}</span><br><span class="m">${m.items.length} items · ${m.min} min</span></span>
        ${dm[m.id] ? `<span class="done">✓</span>` : `<span class="togo">${m.min} min</span>`}
      </a>`).join("")}
    <div class="card" style="margin-top:14px">
      <div class="top"><h2>🔁 10-minute refresh</h2>${nDone ? "" : `<span class="tag">unlocks after your first module</span>`}</div>
      <p class="sub" style="margin:0 0 8px">Re-tests what you've learnt, misses first. Do it once a day until the trip, once on the plane, and once in the hotel — that's the whole maintenance plan.</p>
      ${nDone ? `<a href="#review"><button class="primary">Start refresh</button></a>` : ""}
    </div>
    <a class="mod" href="#all"><span class="ico">📋</span><span><span class="t">Cheat sheet</span><br>
      <span class="m">every phrase in one searchable table — for use in Turkey</span></span></a>
    <p class="sub" style="margin-top:16px">💡 Tip: open this page once while online and it installs itself — including all 🔊 audio (recorded native Turkish speech) — for full offline use. "Add to Home Screen" makes it an app. Tap any row in a test to hear the answer.</p>
  `;
}

/* ---------- study ---------- */
function study(m) {
  const i = MODULES.indexOf(m);
  app.innerHTML = `
    <div class="top"><a class="crumb" href="#home">← All modules</a><span class="tag">module ${i + 1} of ${MODULES.length} · ${m.min} min</span></div>
    <h1>${m.ico} ${m.title}</h1>
    <p class="sub">${m.intro}</p>
    <div class="card">
      <div class="exrow" style="margin:0 0 10px">
        <button id="playAll">▶ Play all — listen through once</button>
        <button class="small" id="stopAll">■</button>
      </div>
      <table><thead><tr><th>Turkish</th><th>say it</th><th>meaning</th></tr></thead><tbody id="sb">
      ${m.items.map((it, ii) => `<tr data-i="${ii}">
        <td class="tr-cell">${it.tr} ${spkBtn(m.id + ":" + ii)}</td>
        <td class="say">${it.say || ""}</td>
        <td class="en-cell">${it.en}${it.note ? `<span class="note">${it.note}</span>` : ""}</td>
      </tr>`).join("")}
      </tbody></table>
      <div class="exrow">
        <a href="#t/${m.id}"><button class="primary">I've said them aloud — test me →</button></a>
      </div>
    </div>
  `;
  wireSpk(app, key => m.items[+key.split(":")[1]].tr);
  const sb = document.getElementById("sb");
  const rowsEls = [...sb.querySelectorAll("tr")];
  function highlight(i) { rowsEls.forEach((r, ri) => r.style.background = ri === i ? "var(--red-soft)" : ""); }
  document.getElementById("playAll").onclick = () => {
    let i = 0;
    const next = () => {
      if (i >= m.items.length) { highlight(-1); return; }
      highlight(i);
      rowsEls[i].scrollIntoView({ block: "center", behavior: "smooth" });
      const cur = i; i++;
      playKey(m.id + ":" + cur, m.items[cur].tr, () => setTimeout(next, 500));
    };
    next();
  };
  document.getElementById("stopAll").onclick = () => { stopAudio(); highlight(-1); };
}

/* ---------- module test: recall-then-reveal, mark only misses ---------- */
function test(m) {
  const order = m.items.map((x, i) => i).sort(() => 0.5 - Math.random());
  app.innerHTML = `
    <div class="top"><a class="crumb" href="#m/${m.id}">← Back to the table</a></div>
    <h1>${m.ico} ${m.title} — test</h1>
    <p class="sub">Read the English, say the Turkish OUT LOUD from memory, then tap the row to check. Mark ✗ only what you missed.</p>
    <div class="card">
      <table><tbody id="tb">
      ${order.map(i => { const it = m.items[i]; return `<tr data-i="${i}">
        <td class="en-cell" style="width:45%">${it.en}</td>
        <td class="veiled"><span><span class="tr-cell" style="font-size:16.5px">${it.tr}</span> <span class="say">${it.say || ""}</span></span></td>
        <td style="width:60px"><button class="small rowbtn">✗</button></td>
      </tr>`; }).join("")}
      </tbody></table>
      <div class="exrow">
        <button class="small" id="revealAll">👁 Reveal all</button>
        <button class="primary" id="finish">✓ Done — I only missed the marked ones</button>
      </div>
    </div>
  `;
  const tb = document.getElementById("tb");
  const missed = new Set();
  tb.querySelectorAll("tr").forEach(tr => {
    const veil = tr.querySelector(".veiled");
    tr.onclick = () => { veil.classList.remove("veiled"); const i = +tr.dataset.i; playKey(m.id + ":" + i, m.items[i].tr); };
    tr.querySelector(".rowbtn").onclick = (e) => {
      e.stopPropagation();
      veil.classList.remove("veiled");
      const i = +tr.dataset.i, key = m.id + ":" + i, b = tr.querySelector(".rowbtn");
      if (missed.has(key)) { missed.delete(key); b.classList.remove("on"); b.textContent = "✗"; }
      else { missed.add(key); b.classList.add("on"); b.textContent = "✗ missed"; }
    };
  });
  document.getElementById("revealAll").onclick = () => tb.querySelectorAll(".veiled").forEach(v => v.classList.remove("veiled"));
  document.getElementById("finish").onclick = () => {
    m.items.forEach((it, i) => markCard(m.id + ":" + i, missed.has(m.id + ":" + i)));
    const dm = doneMods(); dm[m.id] = true; store.set("tk-done", dm);
    const next = MODULES.find(x => !doneMods()[x.id]);
    app.innerHTML = `
      <div class="card" style="text-align:center;padding:30px 16px">
        <div class="big">✓ ${m.title} done${missed.size ? ` — ${missed.size} to revisit` : " — perfect!"}</div>
        <p class="sub" style="margin:8px 0 16px">${missed.size ? "Your misses come back first in every refresh." : "Çok güzel! (very nice)"}</p>
        <div class="exrow" style="justify-content:center">
          ${next ? `<a href="#m/${next.id}"><button class="primary">▶ Next: ${next.title} (${next.min} min)</button></a>` : `<a href="#final"><button class="primary">🎓 Final check</button></a>`}
          <a href="#home"><button>Home</button></a>
        </div>
      </div>`;
  };
}

/* ---------- 10-minute refresh: misses first, then least recently seen ---------- */
function review() {
  const pool = allItems(true);
  if (!pool.length) { location.hash = "home"; return; }
  const c = cards();
  const scored = pool.map(x => {
    const e = c[x.key] || { miss: 0, seen: 0 };
    return { ...x, miss: e.miss, seen: e.seen };
  }).sort((a, b) => b.miss - a.miss || a.seen - b.seen);
  const queue = scored.slice(0, 40).sort(() => 0.5 - Math.random());
  app.innerHTML = `
    <div class="top"><a class="crumb" href="#home">← Home</a><span class="tag">${queue.length} items ≈ 10 min</span></div>
    <h1>🔁 10-minute refresh</h1>
    <p class="sub">Misses first, then whatever you've seen least recently. Say the Turkish out loud, tap to check, mark only real misses.</p>
    <div class="card">
      <table><tbody id="tb">
      ${queue.map((x, qi) => `<tr data-k="${x.key}" data-q="${qi}">
        <td class="en-cell" style="width:45%">${x.it.en}${x.miss ? ` <span class="tag" style="color:var(--red)">missed ×${x.miss}</span>` : ""}</td>
        <td class="veiled"><span><span class="tr-cell" style="font-size:16.5px">${x.it.tr}</span> <span class="say">${x.it.say || ""}</span></span></td>
        <td style="width:60px"><button class="small rowbtn">✗</button></td>
      </tr>`).join("")}
      </tbody></table>
      <div class="exrow">
        <button class="small" id="revealAll">👁 Reveal all</button>
        <button class="primary" id="finish">✓ Done — only the marked ones were misses</button>
      </div>
    </div>
  `;
  const tb = document.getElementById("tb");
  const missed = new Set();
  const byKey = Object.fromEntries(queue.map(x => [x.key, x]));
  tb.querySelectorAll("tr").forEach(tr => {
    const veil = tr.querySelector(".veiled");
    tr.onclick = () => { veil.classList.remove("veiled"); playKey(tr.dataset.k, byKey[tr.dataset.k].it.tr); };
    tr.querySelector(".rowbtn").onclick = (e) => {
      e.stopPropagation(); veil.classList.remove("veiled");
      const k = tr.dataset.k, b = tr.querySelector(".rowbtn");
      if (missed.has(k)) { missed.delete(k); b.classList.remove("on"); b.textContent = "✗"; }
      else { missed.add(k); b.classList.add("on"); b.textContent = "✗ missed"; }
    };
  });
  document.getElementById("revealAll").onclick = () => tb.querySelectorAll(".veiled").forEach(v => v.classList.remove("veiled"));
  document.getElementById("finish").onclick = () => {
    queue.forEach(x => markCard(x.key, missed.has(x.key)));
    const meta = store.get("tk-meta", {}); meta.lastRefresh = new Date().toDateString(); store.set("tk-meta", meta);
    app.innerHTML = `
      <div class="card" style="text-align:center;padding:30px 16px">
        <div class="big">🔁 Refresh done — ${queue.length - missed.size}/${queue.length}</div>
        <p class="sub" style="margin:8px 0 16px">${missed.size ? missed.size + " misses will lead the next refresh." : "Nothing missed. Hazırsın — you're ready."}</p>
        <div class="exrow" style="justify-content:center"><a href="#home"><button class="primary">Home</button></a></div>
      </div>`;
  };
}

/* ---------- final check: 12 MCQs, 80% = trip-ready ---------- */
function finalCheck() {
  const pool = allItems(false).filter(x => x.mod.id !== "sounds");
  const qs = pool.sort(() => 0.5 - Math.random()).slice(0, 12);
  let pos = 0, right = 0;
  function ask() {
    if (pos >= qs.length) return finish();
    const q = qs[pos];
    const dir = Math.random() < 0.5;
    const wrong = pool.filter(x => x.key !== q.key).sort(() => 0.5 - Math.random()).slice(0, 3);
    const opts = [q, ...wrong].sort(() => 0.5 - Math.random());
    app.innerHTML = `
      <div class="top"><a class="crumb" href="#home">← Home</a><span class="tag">${pos + 1} / ${qs.length}</span></div>
      <h1>🎓 Final check</h1>
      <div class="card">
        <p style="font-size:18px;font-weight:600">${dir ? q.it.tr : q.it.en}</p>
        <p class="sub" style="margin:2px 0 8px">${dir ? "what does it mean?" : "how do you say it?"}</p>
        <div class="mcq" id="opts">
          ${opts.map((o, i) => `<button data-i="${i}">${dir ? o.it.en : o.it.tr}</button>`).join("")}
        </div>
        <div id="fb" style="min-height:30px;font-size:14px"></div>
      </div>`;
    document.querySelectorAll("#opts button").forEach(b => b.onclick = () => {
      const pick = opts[+b.dataset.i];
      const ok = pick.key === q.key;
      if (ok) right++;
      markCard(q.key, !ok);
      document.querySelectorAll("#opts button").forEach(x => {
        x.disabled = true;
        if (opts[+x.dataset.i].key === q.key) x.classList.add("ok");
      });
      if (!ok) b.classList.add("no");
      playKey(q.key, q.it.tr);
      document.getElementById("fb").innerHTML = `${ok ? "✓" : "✗"} <strong>${q.it.tr}</strong> = ${q.it.en} <span class="say">${q.it.say || ""}</span>`;
      pos++;
      setTimeout(ask, ok ? 1300 : 2600);
    });
  }
  function finish() {
    const pass = right >= 10;
    if (pass) { const meta = store.get("tk-meta", {}); meta.pass = { score: right, date: new Date().toLocaleDateString() }; store.set("tk-meta", meta); }
    app.innerHTML = `
      <div class="card" style="text-align:center;padding:30px 16px">
        <div class="big">${right} / ${qs.length} ${pass ? "— 🏅 trip-ready!" : ""}</div>
        <p class="sub" style="margin:8px 0 16px">${pass ? "İyi yolculuklar — have a great trip! Do one refresh on the plane." : "10+ passes. One refresh round and try again — your misses now lead the queue."}</p>
        <div class="exrow" style="justify-content:center">
          ${pass ? "" : `<a href="#review"><button class="primary">🔁 Refresh first</button></a>`}
          <a href="#final"><button ${pass ? 'class="primary"' : ""} onclick="setTimeout(render)">Try ${pass ? "again" : "the check again"}</button></a>
          <a href="#home"><button>Home</button></a>
        </div>
      </div>`;
  }
  ask();
}

/* ---------- cheat sheet ---------- */
function cheatSheet() {
  app.innerHTML = `
    <div class="top"><a class="crumb" href="#home">← Home</a></div>
    <h1>📋 Cheat sheet</h1>
    <p class="sub">Every phrase in the course. Filter by anything — Turkish, English, or how it sounds. Works offline; use it in the taxi.</p>
    <input class="filter" id="q" placeholder="filter… (e.g. bill, taxi, thank)">
    <div class="card"><table><tbody id="tb"></tbody></table></div>
  `;
  const tb = document.getElementById("tb");
  const rows = [];
  MODULES.forEach(m => m.items.forEach((it, ii) => rows.push({ m, it, key: m.id + ":" + ii })));
  const trOf = Object.fromEntries(rows.map(r => [r.key, r.it.tr]));
  function draw(f) {
    const ff = (f || "").toLowerCase();
    tb.innerHTML = rows.filter(({ m, it }) =>
      !ff || (it.tr + " " + it.en + " " + (it.say || "") + " " + (it.note || "") + " " + m.title).toLowerCase().includes(ff)
    ).map(({ m, it, key }) => `<tr>
      <td class="tr-cell" style="font-size:16.5px">${it.tr} ${spkBtn(key)}</td>
      <td><span class="say">${it.say || ""}</span></td>
      <td class="en-cell">${it.en}${it.note ? `<span class="note">${it.note}</span>` : ""}<span class="note">${m.ico} ${m.title}</span></td>
    </tr>`).join("") || `<tr><td colspan="3" style="color:var(--muted)">nothing matches</td></tr>`;
    wireSpk(tb, k => trOf[k]);
  }
  draw("");
  document.getElementById("q").oninput = e => draw(e.target.value);
}

if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(() => {});
